---
- name: Test site exists, but stopped in case of duplicate web binding
  website:
    name: "{{ test_site_name }}"
    state: stopped
    physical_path: 'C:\inetpub\wwwroot'

- name: Test virtual directory is absent (baseline)
  virtual_directory:
    state: absent
    site: "{{ test_site_name }}"
    name: "{{ test_vdir_name }}"

- name: Create test virtual directory
  virtual_directory:
    state: present
    site: "{{ test_site_name }}"
    name: "{{ test_vdir_name }}"
    physical_path: "{{ test_physical_path }}"
  register: result

- assert:
    that:
    - 'result.changed == true'

- name: Verify test virtual directory
  virtual_directory_info:
    site: "{{ test_site_name }}"
    name: "{{ test_vdir_name }}"
  register: vdir_info

- assert:
    that:
    - vdir_info.directories | length == 1
    - 'vdir_info.directories[0].physical_path == test_physical_path'

- name: Create test application temporary directory
  ansible.windows.win_tempfile:
    suffix: ".{{ test_app_name }}"
    state: directory
  register: test_app_tmp_dir

- name: Create new test application
  web_application:
    name: "{{ test_app_name }}"
    site: "{{ test_site_name }}"
    physical_path: "{{ test_app_tmp_dir.path }}"
    state: present

- name: Create virtual directory and use pass through authentication
  virtual_directory:
    state: present
    site: "{{ test_site_name }}"
    name: "{{ test_vdir_name }}"
    physical_path: "{{ test_physical_path }}"
    connect_as: pass_through
    application: "{{ test_app_name }}"
  register: result

- assert:
    that:
    - 'result.changed == true'

- name: Verify virtual directory with pass through authentication
  virtual_directory_info:
    site: "{{ test_site_name }}"
    name: "{{ test_vdir_name }}"
    application: "{{ test_app_name }}"
  register: vdir_info

- assert:
    that:
    - 'vdir_info.directories[0].physical_path == test_physical_path'
