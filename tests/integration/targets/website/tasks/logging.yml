---
- name: change logging path and period for website
  microsoft.iis.website:
    name: "{{ test_website_name }}"
    logging:
      directory: "{{ test_logs_path }}"
      period: hourly
  register: website

- name: get change logging info
  microsoft.iis.website_info:
    name: "{{ test_website_name }}"
  register: website_info

- assert:
    that:
      - website is changed
      - website_info.site[0].logging.enabled == true
      - website_info.site[0].logging.directory == test_logs_path
      - website_info.site[0].logging.period == "Hourly"
      - website_info.site[0].logging.target_w3c[0] == "File"

- name: change logging path and period for website (idempotent)
  microsoft.iis.website:
    name: "{{ test_website_name }}"
    logging:
      directory: "{{ test_logs_path }}"
      period: hourly
  register: website

- name: get change logging info (idempotent)
  microsoft.iis.website_info:
    name: "{{ test_website_name }}"
  register: website_info

- assert:
    that:
      - website is not changed
      - website_info.site[0].logging.enabled == true
      - website_info.site[0].logging.directory == test_logs_path
      - website_info.site[0].logging.period == "Hourly"
      - website_info.site[0].logging.target_w3c[0] == "File"

- name: disable logging for website
  microsoft.iis.website:
    name: "{{ test_website_name }}"
    logging:
      enabled: false
  register: website

- name: get change logging info
  microsoft.iis.website_info:
    name: "{{ test_website_name }}"
  register: website_info

- assert:
    that:
      - website is changed
      - website_info.site[0].logging.enabled == false
      - website_info.site[0].logging.directory == test_logs_path
      - website_info.site[0].logging.period == "Hourly"
      - website_info.site[0].logging.target_w3c[0] == "File"

- name: re-enable logging for website
  microsoft.iis.website:
    name: "{{ test_website_name }}"
    logging:
      enabled: true
  register: website

- name: get change logging info
  microsoft.iis.website_info:
    name: "{{ test_website_name }}"
  register: website_info

- assert:
    that:
      - website is changed
      - website_info.site[0].logging.enabled == true
      - website_info.site[0].logging.directory == test_logs_path
      - website_info.site[0].logging.period == "Hourly"
      - website_info.site[0].logging.target_w3c[0] == "File"

- name: change logging W3C target to ETW for website
  microsoft.iis.website:
    name: "{{ test_website_name }}"
    logging:
      target_w3c:
        - "ETW"
  register: website

- name: get change logging info
  microsoft.iis.website_info:
    name: "{{ test_website_name }}"
  register: website_info

- assert:
    that:
      - website is changed
      - website_info.site[0].logging.enabled == true
      - website_info.site[0].logging.directory == test_logs_path
      - website_info.site[0].logging.period == "Hourly"
      - website_info.site[0].logging.target_w3c[0] == "ETW"

- name: change logging W3C target to File and ETW for website
  microsoft.iis.website:
    name: "{{ test_website_name }}"
    logging:
      target_w3c:
        - "File"
        - "ETW"
  register: website

- name: get change logging info
  microsoft.iis.website_info:
    name: "{{ test_website_name }}"
  register: website_info

- assert:
    that:
      - website is changed
      - website_info.site[0].logging.enabled == true
      - website_info.site[0].logging.directory == test_logs_path
      - website_info.site[0].logging.period == "Hourly"
      - website_info.site[0].logging.target_w3c[0] == "File"
      - website_info.site[0].logging.target_w3c[1] == "ETW"

- name: change logging W3C target back to File for website
  microsoft.iis.website:
    name: "{{ test_website_name }}"
    logging:
      target_w3c:
        - "File"
  register: website

- name: get change logging info
  microsoft.iis.website_info:
    name: "{{ test_website_name }}"
  register: website_info

- assert:
    that:
      - website is changed
      - website_info.site[0].logging.enabled == true
      - website_info.site[0].logging.directory == test_logs_path
      - website_info.site[0].logging.period == "Hourly"
      - website_info.site[0].logging.target_w3c[0] == "File"

- name: set logging fields for website
  microsoft.iis.website:
    name: "{{ test_website_name }}"
    logging:
      fields:
        set:
          - "Date"
          - "Time"
          - "ClientIP"
